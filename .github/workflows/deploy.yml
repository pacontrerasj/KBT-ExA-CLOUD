name: Deploy a EC2 via Terraform + ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_ROOT: tienda-vehiculos-EC2/terraform
  APP_DIR: /home/ec2-user/tienda-vehiculos

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init
        run: terraform init -reconfigure -input=false -no-color

      - name: Verificar si ya hay state en S3
        id: check_state
        run: |
          if aws s3api head-object --bucket tfstate-908345399651-tienda-vehiculos --key infra/terraform.tfstate 2>/dev/null; then
            echo "STATE_EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo "STATE_EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Limpiar recursos de apply previo (solo si no hay state)
        if: steps.check_state.outputs.STATE_EXISTS == 'false'
        continue-on-error: true
        run: |
          aws ecr delete-repository --repository-name tienda-vehiculos-frontend --force 2>/dev/null || true
          aws ecr delete-repository --repository-name tienda-vehiculos-backend --force 2>/dev/null || true
          aws rds delete-db-subnet-group --db-subnet-group-name subnet-group-tienda-vehiculos 2>/dev/null || true

      - name: Terraform Plan
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan \
            -var="mi_ip=${{ secrets.MI_IP }}" \
            -var="key_name=${{ secrets.KEY_NAME }}" \
            -var="existing_vpc_id=${{ vars.EXISTING_VPC_ID || '' }}" 2>&1 | tee tfplan.log

      - name: Terraform Apply
        run: |
          set -o pipefail
          terraform apply -auto-approve -input=false -no-color \
            -var="mi_ip=${{ secrets.MI_IP }}" \
            -var="key_name=${{ secrets.KEY_NAME }}" \
            -var="existing_vpc_id=${{ vars.EXISTING_VPC_ID || '' }}" 2>&1 | tee tfapply.log
          echo "---"
          echo "Ultimas 50 lineas del log:"
          tail -n 50 tfapply.log

      - name: Obtener outputs
        id: outputs
        if: success()
        run: |
          safe_output() {
            val=$(terraform output -raw "$1" 2>/dev/null || echo "")
            echo "$val"
          }
          echo "EC2_HOST=$(safe_output ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "ECR_FRONTEND=$(safe_output ecr_frontend_url)" >> $GITHUB_OUTPUT
          echo "ECR_BACKEND=$(safe_output ecr_backend_url)" >> $GITHUB_OUTPUT
          echo "RDS_ENDPOINT=$(safe_output rds_endpoint)" >> $GITHUB_OUTPUT
          echo "RDS_PORT=$(safe_output rds_port)" >> $GITHUB_OUTPUT
          DB_PASS=$(safe_output db_password)
          echo "::add-mask::$DB_PASS"
          echo "DB_PASSWORD=$DB_PASS" >> $GITHUB_OUTPUT

    outputs:
      ec2_host: ${{ steps.outputs.outputs.EC2_HOST }}
      ecr_frontend: ${{ steps.outputs.outputs.ECR_FRONTEND }}
      ecr_backend: ${{ steps.outputs.outputs.ECR_BACKEND }}
      rds_endpoint: ${{ steps.outputs.outputs.RDS_ENDPOINT }}
      rds_port: ${{ steps.outputs.outputs.RDS_PORT }}
      db_password: ${{ steps.outputs.outputs.DB_PASSWORD }}

  build-and-push:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push frontend
        uses: docker/build-push-action@v5
        with:
          context: tienda-vehiculos-EC2/tienda-vehiculos-frontend
          file: tienda-vehiculos-EC2/tienda-vehiculos-frontend/Dockerfile
          push: true
          tags: |
            ${{ needs.terraform.outputs.ecr_frontend }}:${{ github.sha }}
            ${{ needs.terraform.outputs.ecr_frontend }}:latest

      - name: Build y push backend
        uses: docker/build-push-action@v5
        with:
          context: tienda-vehiculos-EC2/tienda-vehiculos-backend
          file: tienda-vehiculos-EC2/tienda-vehiculos-backend/Dockerfile
          push: true
          tags: |
            ${{ needs.terraform.outputs.ecr_backend }}:${{ github.sha }}
            ${{ needs.terraform.outputs.ecr_backend }}:latest

  deploy:
    needs: [terraform, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener token ECR
        id: ecr
        run: |
          PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          echo "::add-mask::$PASSWORD"
          echo "ecr_password=$PASSWORD" >> $GITHUB_OUTPUT

      - name: Copiar docker-compose.yml a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ needs.terraform.outputs.ec2_host }}
          username: ${{ vars.EC2_USER || 'ec2-user' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "tienda-vehiculos-EC2/docker-compose.yml"
          target: ${{ env.APP_DIR }}/

      - name: Deploy via SSH a EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ec2_host }}
          username: ${{ vars.EC2_USER || 'ec2-user' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
            export AWS_REGION=${{ env.AWS_REGION }}
            export DB_HOST=${{ needs.terraform.outputs.rds_endpoint }}
            export DB_USER=${{ secrets.DB_USER || 'admin' }}
            export DB_PASSWORD=${{ needs.terraform.outputs.db_password }}
            export DB_NAME=${{ vars.DB_NAME || 'tienda_vehiculos' }}
            export DB_PORT=${{ needs.terraform.outputs.rds_port }}
            export IMAGE_TAG=${{ github.sha }}
            export ECR_PASSWORD='${{ steps.ecr.outputs.ecr_password }}'

            cd ${{ env.APP_DIR }}

            cat > .env << EOF
            DB_HOST=${DB_HOST}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_NAME=${DB_NAME}
            DB_PORT=${DB_PORT}
            EOF

            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
            docker compose pull
            docker compose up -d
            docker system prune -af
